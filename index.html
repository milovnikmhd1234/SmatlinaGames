<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smatlina Portál 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4fc3f7;
            --secondary: #ffdd57;
            --danger: #ff5252;
            --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 800px; padding: 20px; text-align: center; }

        .section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 20px 0;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: 0.3s;
        }

        .btn-google { background: white; color: #444; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-logout { background: var(--danger); color: white; display: none; }

        #admin-panel { display: none; margin-top: 20px; border-top: 1px solid var(--secondary); padding-top: 20px; }
        textarea { width: 100%; border-radius: 10px; padding: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid #555; }

        .log-entry { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin: 10px 0; text-align: left; border-left: 4px solid var(--secondary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Smatlina Portál 🚀</h1>

    <div class="section">
        <h2 id="welcome-msg">Vítej, poutníku!</h2>
        <div id="auth-buttons">
            <button class="btn btn-google" id="btn-google">Přihlásit přes Google</button>
            <button class="btn btn-discord" id="btn-discord">Přihlásit přes Discord</button>
        </div>
        <button class="btn btn-logout" id="btn-logout">Odhlásit se</button>
    </div>

    <div class="section">
        <h2>📢 Update Log</h2>
        <div id="admin-panel">
            <textarea id="log-input" placeholder="Napiš novinku..."></textarea>
            <button class="btn" style="background:var(--secondary)" id="btn-add-log">Publikovat</button>
        </div>
        <div id="log-list">Načítám zprávy...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, DiscordAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // TVÁ KONFIGURACE
    const firebaseConfig = {
        apiKey: "AIzaSyBOQyh3IKxnFGlg3j_fpexbsA2o_VqYyaQ",
        authDomain: "smatlina-ebc6d.firebaseapp.com",
        projectId: "smatlina-ebc6d",
        storageBucket: "smatlina-ebc6d.firebasestorage.app",
        messagingSenderId: "893690441436",
        appId: "1:893690441436:web:9a6626e23b5453de410e19"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // TLAČÍTKA - PŘIHLÁŠENÍ
    document.getElementById('btn-google').onclick = () => {
        signInWithPopup(auth, new GoogleAuthProvider()).catch(e => alert("Chyba: " + e.message));
    };

    document.getElementById('btn-discord').onclick = () => {
        signInWithPopup(auth, new DiscordAuthProvider()).catch(e => alert("Chyba: " + e.message));
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // SLEDOVÁNÍ STAVU (ADMIN CHECK)
    onAuthStateChanged(auth, (user) => {
        const adminPanel = document.getElementById('admin-panel');
        const authBtns = document.getElementById('auth-buttons');
        const logoutBtn = document.getElementById('btn-logout');
        const welcome = document.getElementById('welcome-msg');

        if (user) {
            welcome.innerText = "Ahoj, " + user.displayName + "!";
            authBtns.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            // Kontrola, zda jsi to ty
            if (user.email === "smatlakp003@gmail.com") {
                adminPanel.style.display = 'block';
            }
        } else {
            welcome.innerText = "Vítej, poutníku!";
            authBtns.style.display = 'block';
            logoutBtn.style.display = 'none';
            adminPanel.style.display = 'none';
        }
    });

    // PŘIDÁVÁNÍ LOGŮ
    document.getElementById('btn-add-log').onclick = async () => {
        const text = document.getElementById('log-input').value;
        if (!text) return;
        await addDoc(collection(db, "updates"), {
            text: text,
            date: new Date().toLocaleDateString("cs-CZ"),
            timestamp: Date.now()
        });
        document.getElementById('log-input').value = "";
    };

    // NAČÍTÁNÍ LOGŮ V REÁLNÉM ČASE
    onSnapshot(query(collection(db, "updates"), orderBy("timestamp", "desc")), (snap) => {
        const list = document.getElementById('log-list');
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `<div class="log-entry"><small>${d.date}</small><p>${d.text}</p></div>`;
        });
    });
</script>

</body>
</html>
