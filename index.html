<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmatlinaGames | Portal</title>
    <style>
        /* DESIGN STRÁNKY */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #0f0f0f; color: white; }
        
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000; height: 60px;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #4285F4; object-fit: cover; background: #333; }
        
        .rank-badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; text-transform: uppercase; margin-top: 2px; display: inline-block; }
        
        /* Barvy Ranků */
        .rank-clen { background: #555; color: white; }
        .rank-moderator { background: #28a745; color: white; }
        .rank-zkuseny-moderator { background: #f39c12; color: white; }
        .rank-spravce { background: #e74c3c; color: white; }
        .rank-majitel { background: #9b59b6; color: white; box-shadow: 0 0 10px #9b59b6; border: 1px solid white; }

        .auth-buttons { display: flex; gap: 10px; }
        .btn { padding: 8px 14px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; font-size: 12px; transition: 0.2s; text-decoration: none; }
        .btn-blue { background: #4285F4; color: white; }
        .btn-blue:hover { background: #357ae8; }
        .btn-gray { background: #333; color: #ccc; }
        .btn-gray:hover { background: #444; color: white; }

        .container { max-width: 900px; margin: 40px auto; padding: 20px; text-align: center; }
        
        /* Mřížka tlačítek */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .menu-item { 
            background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; 
            text-decoration: none; color: white; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; font-weight: bold;
        }
        .menu-item:hover { border-color: #4285F4; transform: translateY(-5px); background: #252525; }

        /* Modální okna */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #222; margin: 10% auto; padding: 30px; width: 90%; max-width: 350px; border-radius: 15px; border: 1px solid #444; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="user-info">
            <div id="loggedInData" class="hidden">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img id="userImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                    <div style="text-align: left;">
                        <div id="userName" style="font-weight: bold; font-size: 14px;">Načítání...</div>
                        <div id="userRank" class="rank-badge rank-clen">Člen</div>
                    </div>
                    <button id="ownerBtn" class="btn btn-gray" style="margin-left: 10px; font-size: 10px;" onclick="becomeOwner()">MAJITEL LOGIN</button>
                </div>
            </div>
            <span id="loginPrompt" style="font-size: 14px; color: #888;">Nepřihlášen</span>
        </div>
        
        <div class="auth-buttons">
            <button id="loginBtn" class="btn btn-gray" onclick="openModal('login')">PŘIHLÁSIT SE</button>
            <button id="signupBtn" class="btn btn-blue" onclick="openModal('signup')">VYTVOŘIT ÚČET</button>
            <button id="logoutBtn" class="btn btn-gray hidden" onclick="logout()">ODHLÁSIT</button>
        </div>
    </nav>

    <div class="container">
        <h1 style="color: #4285F4;">SmatlinaGames Portal</h1>
        <p style="color: #888;">Vítej zpět! Tady máš vše po ruce.</p>
        
        <div class="menu-grid">
            <a href="https://milovnikmhd1234.github.io/SmatlinaGames/Hry" class="menu-item">🎮 Moje Hry</a>
            <a href="https://milovnikmhd1234.github.io/SmatlinaGames/Nostalgie" class="menu-item">⏳ Nostalgie</a>
            <a href="https://milovnikmhd1234.github.io/SmatlinaGames/Kontakt" class="menu-item">📧 Kontakt</a>
            <div class="menu-item" onclick="openSettings()">⚙️ Upravit Profil</div>
            <div class="menu-item">💬 Chat (Již brzy)</div>

            <div id="adminTools" class="hidden" style="display: contents;">
                <div class="menu-item" style="border-color: #9b59b6; color: #9b59b6;">🛠️ Moderation</div>
                <div class="menu-item" style="border-color: #9b59b6; color: #9b59b6;">👑 Rank Control</div>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Vytvořit účet</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Heslo">
            <button class="btn btn-blue" style="width: 100%; margin-top: 10px; padding: 12px;" onclick="handleAuth()">Potvrdit</button>
            <button class="btn btn-gray" style="width: 100%; margin-top: 10px; padding: 12px;" onclick="loginWithGoogle()">Google Login</button>
            <button class="btn btn-gray" style="width: 100%; margin-top: 10px;" onclick="closeModal()">Zavřít</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Upravit profil</h2>
            <input type="text" id="newUsername" placeholder="Nové jméno">
            <input type="text" id="newPhoto" placeholder="URL profilovky (odkaz na obrázek)">
            <button class="btn btn-blue" style="width: 100%; margin-top: 10px;" onclick="saveProfile()">Uložit změny</button>
            <button class="btn btn-gray" style="width: 100%; margin-top: 10px;" onclick="closeModal()">Zrušit</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOQyh3IKxnFGlg3j_fpexbsA2o_VqYyaQ",
            authDomain: "smatlina-ebc6d.firebaseapp.com",
            projectId: "smatlina-ebc6d",
            storageBucket: "smatlina-ebc6d.firebasestorage.app",
            messagingSenderId: "893690441436",
            appId: "1:893690441436:web:9a6626e23b5453de410e19"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentMode = 'signup';
        let currentUser = null;

        // SLEDOVÁNÍ STAVU PŘIHLÁŠENÍ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    showLoggedIn(userSnap.data());
                } else {
                    // Prvový vytvoření uživatele v DB
                    const initialData = { 
                        username: user.displayName || "Hráč", 
                        rank: "Člen", 
                        photo: user.photoURL || "" 
                    };
                    await setDoc(userRef, initialData);
                    showLoggedIn(initialData);
                }
            } else {
                showLoggedOut();
            }
        });

        function showLoggedIn(data) {
            document.getElementById('loggedInData').classList.remove('hidden');
            document.getElementById('loginPrompt').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('signupBtn').classList.add('hidden');
            
            document.getElementById('userName').innerText = data.username;
            document.getElementById('userImg').src = data.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            const rankEl = document.getElementById('userRank');
            rankEl.innerText = data.rank;
            // Oprava pro dynamické barvy tříd (Člen -> rank-clen)
            const safeRankClass = data.rank.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "-");
            rankEl.className = "rank-badge rank-" + safeRankClass;

            if(data.rank === "Majitel") {
                document.getElementById('adminTools').classList.remove('hidden');
            }
        }

        function showLoggedOut() {
            document.getElementById('loggedInData').classList.add('hidden');
            document.getElementById('loginPrompt').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('signupBtn').classList.remove('hidden');
            document.getElementById('adminTools').classList.add('hidden');
        }

        // FUNKCE MODÁLŮ
        window.openModal = (mode) => { 
            currentMode = mode; 
            document.getElementById('authModal').style.display = 'block'; 
            document.getElementById('modalTitle').innerText = mode === 'signup' ? 'Vytvořit účet' : 'Přihlásit se';
        };
        window.closeModal = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };
        window.openSettings = () => { if(currentUser) document.getElementById('settingsModal').style.display = 'block'; else alert("Nejdřív se přihlas!"); };

        // PŘIHLÁŠENÍ E-MAILEM
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (currentMode === 'signup') await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
                closeModal();
            } catch (e) { alert("Chyba: " + e.message); }
        };

        // GOOGLE LOGIN
        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, provider); closeModal(); } catch (e) { alert(e.message); } };

        // UKLÁDÁNÍ PROFILU
        window.saveProfile = async () => {
            const name = document.getElementById('newUsername').value;
            const photo = document.getElementById('newPhoto').value;
            const updateData = {};
            if(name.trim() !== "") updateData.username = name;
            if(photo.trim() !== "") updateData.photo = photo;

            if(Object.keys(updateData).length > 0) {
                try {
                    await updateDoc(doc(db, "users", currentUser.uid), updateData);
                    alert("Změny uloženy!");
                    location.reload();
                } catch(e) { alert("Chyba při ukládání: " + e.message); }
            } else { alert("Nic jsi nevyplnil."); }
        };

        // RANK MAJITEL
        window.becomeOwner = async () => {
            const pass = prompt("Zadej tajné heslo pro rank Majitel:");
            if(pass === "Fgp742OPOsite") {
                await updateDoc(doc(db, "users", currentUser.uid), { rank: "Majitel" });
                alert("Rank MAJITEL aktivován!");
                location.reload();
            } else { alert("Špatné heslo!"); }
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
