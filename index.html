<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmatlinaGames | Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f0f0f; color: white; }
        
        /* Horní lišta */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000;
        }

        .user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #4285F4; object-fit: cover; }
        .rank-badge { padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        
        /* Barvy ranků */
        .rank-clen { background: #555; }
        .rank-moderator { background: #28a745; }
        .rank-zkuseny-mod { background: #f39c12; }
        .rank-spravce { background: #e74c3c; }
        .rank-majitel { background: #9b59b6; box-shadow: 0 0 10px #9b59b6; border: 1px solid white; }

        .auth-buttons { display: flex; gap: 8px; }
        .btn { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-blue { background: #4285F4; color: white; }
        .btn-gray { background: #333; color: #ccc; }
        .btn-gray:hover { background: #444; color: white; }

        /* Hlavní menu */
        .container { max-width: 900px; margin: 40px auto; padding: 20px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .menu-item { 
            background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; 
            text-decoration: none; color: white; transition: 0.3s; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-item:hover { border-color: #4285F4; transform: translateY(-5px); background: #222; }
        .menu-item i { font-size: 24px; }

        /* Modály */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #222; margin: 10% auto; padding: 30px; width: 350px; border-radius: 15px; border: 1px solid #444; position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="user-info">
            <div id="loggedInData" class="hidden" style="display: flex; align-items: center; gap: 10px;">
                <img id="userImg" src="" alt="P">
                <div>
                    <strong id="userName">Hráč</strong><br>
                    <span id="userRank" class="rank-badge rank-clen">Člen</span>
                </div>
                <button id="ownerBtn" class="btn btn-gray" onclick="becomeOwner()">MAJITEL LOGIN</button>
            </div>
            <span id="loginPrompt">Přihlas se pro přístup k funkcím</span>
        </div>
        
        <div class="auth-buttons">
            <button id="loginBtn" class="btn btn-gray" onclick="openModal('login')">PŘIHLÁSIT SE</button>
            <button id="signupBtn" class="btn btn-blue" onclick="openModal('signup')">VYTVOŘIT ÚČET</button>
            <button id="logoutBtn" class="btn btn-gray hidden" onclick="logout()">ODHLÁSIT</button>
        </div>
    </nav>

    <div class="container">
        <h1>SmatlinaGames Portal</h1>
        <p style="color: #888;">Vítej v centru tvého herního světa</p>
        
        <div class="menu-grid">
            <a href="https://milovnikmhd1234.github.io/SmatlinaGames/Hry" class="menu-item">🎮 <span>Moje Hry</span></a>
            <a href="https://milovnikmhd1234.github.io/SmatlinaGames/Nostalgie" class="menu-item">⏳ <span>Nostalgie</span></a>
            <a href="https://milovnikmhd1234.github.io/SmatlinaGames/Kontakt" class="menu-item">📧 <span>Kontakt</span></a>
            <div class="menu-item" onclick="openSettings()">⚙️ <span>Upravit Profil</span></div>
            <div class="menu-item">💬 <span>Globální Chat</span></div>

            <div id="adminTools" class="hidden" style="display: contents;">
                <div class="menu-item" style="border-color: #9b59b6; background: rgba(155, 89, 182, 0.1);">🛠️ <span>Moderation</span></div>
                <div class="menu-item" style="border-color: #9b59b6; background: rgba(155, 89, 182, 0.1);">👑 <span>Rank Control</span></div>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Vytvořit účet</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Heslo">
            <button class="btn btn-blue" style="width: 100%; margin-top: 10px;" onclick="handleAuth()">Potvrdit</button>
            <button class="btn btn-gray" style="width: 100%; margin-top: 10px;" onclick="loginWithGoogle()">Google Login</button>
            <button class="btn btn-gray" style="width: 100%; margin-top: 10px;" onclick="closeModal()">Zavřít</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Nastavení profilu</h2>
            <input type="text" id="newUsername" placeholder="Nové jméno">
            <input type="text" id="newPhoto" placeholder="URL obrázku (profilovky)">
            <button class="btn btn-blue" style="width: 100%;" onclick="saveProfile()">Uložit změny</button>
            <button class="btn btn-gray" style="width: 100%; margin-top: 10px;" onclick="closeModal()">Zrušit</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOQyh3IKxnFGlg3j_fpexbsA2o_VqYyaQ",
            authDomain: "smatlina-ebc6d.firebaseapp.com",
            projectId: "smatlina-ebc6d",
            storageBucket: "smatlina-ebc6d.firebasestorage.app",
            messagingSenderId: "893690441436",
            appId: "1:893690441436:web:9a6626e23b5453de410e19"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentMode = 'signup';
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                let userData = userDoc.exists() ? userDoc.data() : null;

                if (!userData) {
                    userData = { username: user.displayName || "Hráč", rank: "Člen", photo: user.photoURL || "" };
                    await setDoc(doc(db, "users", user.uid), userData);
                }
                showLoggedIn(userData);
            } else {
                showLoggedOut();
            }
        });

        function showLoggedIn(data) {
            document.getElementById('loggedInData').classList.remove('hidden');
            document.getElementById('loginPrompt').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('signupBtn').classList.add('hidden');
            
            document.getElementById('userName').innerText = data.username;
            document.getElementById('userImg').src = data.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            const rankEl = document.getElementById('userRank');
            rankEl.innerText = data.rank;
            // Upraveno pro správné barvy ranků
            const rankClass = data.rank.toLowerCase().replace(" ", "-");
            rankEl.className = "rank-badge rank-" + rankClass;

            if(data.rank === "Majitel") {
                document.getElementById('adminTools').classList.remove('hidden');
            }
        }

        function showLoggedOut() {
            document.getElementById('loggedInData').classList.add('hidden');
            document.getElementById('loginPrompt').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('signupBtn').classList.remove('hidden');
            document.getElementById('adminTools').classList.add('hidden');
        }

        window.openModal = (mode) => { currentMode = mode; document.getElementById('authModal').style.display = 'block'; };
        window.closeModal = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };
        window.openSettings = () => { if(currentUser) document.getElementById('settingsModal').style.display = 'block'; else alert("Nejdřív se přihlas!"); };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (currentMode === 'signup') await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
                closeModal();
            } catch (e) { alert("Chyba: " + e.message); }
        };

        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, provider); closeModal(); } catch (e) { alert(e.message); } };

        window.saveProfile = async () => {
            const name = document.getElementById('newUsername').value;
            const photo = document.getElementById('newPhoto').value;
            const updateData = {};
            if(name) updateData.username = name;
            if(photo) updateData.photo = photo;

            if(Object.keys(updateData).length > 0) {
                await updateDoc(doc(db, "users", currentUser.uid), updateData);
                location.reload();
            }
        };

        window.becomeOwner = async () => {
            const pass = prompt("Zadej tajné heslo pro rank Majitel:");
            if(pass === "Fgp742OPOsite") {
                await updateDoc(doc(db, "users", currentUser.uid), { rank: "Majitel" });
                alert("Rank MAJITEL aktivován!");
                location.reload();
            } else { alert("Špatné heslo!"); }
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
