<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smatlina - Přihlášení</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { text-align: center; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 15px 30px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; background: white; color: #444; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Smatlina Portál 🚀</h1>
        <p>Pro vstup se musíš přihlásit</p>
        <button class="btn" id="btn-google">🌐 Přihlásit se přes Google</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOQyh3IKxnFGlg3j_fpexbsA2o_VqYyaQ",
        authDomain: "smatlina-ebc6d.firebaseapp.com",
        projectId: "smatlina-ebc6d",
        storageBucket: "smatlina-ebc6d.firebasestorage.app",
        messagingSenderId: "893690441436",
        appId: "1:893690441436:web:9a6626e23b5453de410e19"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Po kliknutí přesměruje na Google
    document.getElementById('btn-google').onclick = () => {
        signInWithRedirect(auth, new GoogleAuthProvider());
    };

    // HLAVNÍ TRIK: Pokud už je uživatel přihlášen, hned ho hoď na domovskou stránku
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.assign("https://milovnikmhd1234.github.io/SmatlinaGames/DomovskaStranka");
        }
    });
</script>
</body>
</html>
