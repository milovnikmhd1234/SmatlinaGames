<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt - Smatlina</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
        margin: 0;
        padding: 50px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    h1 {
        font-size: 3em;
        color: #ffdd57;
        text-shadow: 2px 2px 5px #000;
        margin-bottom: 40px;
        text-align: center;
    }

    h2 {
        color: #ffdd57;
        margin-top: 30px;
        font-size: 2em;
    }

    .contact-box {
        background: rgba(0,0,0,0.7);
        border-radius: 15px;
        padding: 20px 40px;
        width: 100%;
        max-width: 600px;
        margin-bottom: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        text-align: center; /* Změněno na center pro lepší vzhled seznamu */
        transition: 0.3s;
    }

    .contact-box:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.5);
    }

    .contact-box p {
        margin: 12px 0;
        font-size: 18px;
        line-height: 1.6;
    }

    .friends-list {
        list-style: none;
        padding: 0;
        font-size: 1.2em;
    }

    .friends-list li {
        margin: 10px 0;
    }

    .nick {
        color: #4fc3f7;
        font-style: italic;
    }

    a {
        color: #4fc3f7;
        text-decoration: none;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>
